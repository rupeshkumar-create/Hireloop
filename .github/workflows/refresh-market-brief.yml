name: Refresh Weekly Market Brief

on:
  schedule:
    # Mondays 10:00 UTC — within GitHub Actions free tier (2,000 min/mo)
    - cron: '0 10 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hireschema-market-brief
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh market brief snapshot
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: npm run refresh:market-brief

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/server/contentGrowth/marketBrief/weeklyRolesSnapshot.ts
          if git diff --staged --quiet; then
            echo "No market brief changes to commit."
            exit 0
          fi
          git commit -m "$(cat <<'EOF'
chore(content): refresh weekly remote roles market brief

EOF
)"
          git push
