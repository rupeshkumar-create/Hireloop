name: Generate Daily Jobs

on:
  schedule:
    - cron: '30 2 * * *'
    - cron: '0 9 * * *'

  workflow_dispatch:
    inputs:
      user_id:
        description: 'User ID to process (leave empty to process all active users)'
        required: false
        default: ''

  repository_dispatch:
    types: [generate-jobs-for-user]

permissions:
  contents: read

concurrency:
  group: hireschema-generate-jobs-${{ github.event_name }}-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

jobs:
  generate:
    if: github.event_name != 'repository_dispatch' || github.event.action == 'generate-jobs-for-user'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Load environment
        env:
          REQUIRE_APIFY: 'true'
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FIRESTORE_DATABASE_ID: ${{ secrets.FIRESTORE_DATABASE_ID }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: bash scripts/gha-source-env.sh

      - name: Generate daily jobs
        env:
          USER_ID: >-
            ${{
              github.event.inputs.user_id ||
              github.event.client_payload.userId ||
              ''
            }}
          FORCE_RERUN: >-
            ${{
              github.event.client_payload.force == true && 'true' || 'false'
            }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ env.FIREBASE_SERVICE_ACCOUNT_KEY }}
          OPENROUTER_API_KEY: ${{ env.OPENROUTER_API_KEY }}
          FIRESTORE_DATABASE_ID: ${{ env.FIRESTORE_DATABASE_ID }}
          APIFY_API_TOKEN: ${{ env.APIFY_API_TOKEN }}
        run: npx tsx scripts/generate-daily-jobs.ts
