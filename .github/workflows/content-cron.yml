name: Content Growth Cron

on:
  schedule:
    # Daily blog — 08:05, 12:00, 18:00 UTC
    - cron: '5 8 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
    # Weekly Reddit trends — Mondays 10:00 UTC
    - cron: '0 10 * * 1'
    # Weekly strategy — Saturdays 08:00 UTC
    - cron: '0 8 * * 6'
    # Monthly learning — 1st of month 08:00 UTC
    - cron: '0 8 1 * *'

  workflow_dispatch:
    inputs:
      job:
        description: 'Which content job to run'
        required: true
        default: daily-blog
        type: choice
        options:
          - daily-blog
          - weekly-trends
          - weekly-analysis
          - monthly-learning
      dry_run:
        description: 'Dry run (no publish)'
        required: false
        default: false
        type: boolean

  repository_dispatch:
    types: [run-content-cron]

permissions:
  contents: read

concurrency:
  group: hireschema-content-cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve job
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "job=${{ github.event.inputs.job }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "job=${{ github.event.client_payload.job || 'daily-blog' }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ github.event.client_payload.dryRun == true && 'true' || 'false' }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "5 8 * * *" ] || [ "${{ github.event.schedule }}" = "0 12 * * *" ] || [ "${{ github.event.schedule }}" = "0 18 * * *" ]; then
            echo "job=daily-blog" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 10 * * 1" ]; then
            echo "job=weekly-trends" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 8 * * 6" ]; then
            echo "job=weekly-analysis" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 8 1 * *" ]; then
            echo "job=monthly-learning" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "job=daily-blog" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Load environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FIRESTORE_DATABASE_ID: ${{ secrets.FIRESTORE_DATABASE_ID }}
        run: bash scripts/gha-source-env.sh

      - name: Run content cron
        env:
          JOB: ${{ steps.resolve.outputs.job }}
          DRY_RUN: ${{ steps.resolve.outputs.dry_run == 'true' && 'true' || 'false' }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FIRESTORE_DATABASE_ID: ${{ secrets.FIRESTORE_DATABASE_ID }}
        run: npx tsx scripts/run-content-cron.ts
